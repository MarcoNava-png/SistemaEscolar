<div class="login-container">
  <p-card subheader="" class="login-card">
    <div class="logo-container">
      <img src="assets/img/Logousag.png" alt="Logo USAG" class="logo">
    </div>
    <div class="title-container">
      <h2>Iniciar Sesión</h2>
    </div>
    <form [formGroup]="loginForm" (ngSubmit)="login()"> 
      <div class="p-float-label input-field">
        <input pInputText id="usuario" formControlName="nombreUsuario" />
        <label for="usuario">Usuario</label>
      </div>
      <div class="p-float-label input-field">
        <p-password id="password" formControlName="contrasena" [feedback]="false"></p-password>
        <label for="password">Contraseña</label>
      </div>      
      <div class="button-container">
        <p-button type="submit" label="Iniciar sesión" [loading]="isLoading"></p-button>
      </div>
    </form>
  </p-card>
</div>
